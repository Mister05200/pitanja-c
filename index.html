<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест из програмског језика Ц (Питања 1-40)</title>
    <style>
        :root {
            --primary: #0056b3;
            --secondary: #e9ecef;
            --success: #28a745;
            --danger: #dc3545;
            --text: #333;
            --bg: #f4f7f6;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1, h2, h3 { color: var(--primary); }
        pre {
            background: #272822;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
            font-family: Consolas, Monaco, monospace;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 20px 0;
        }
        .option-label {
            display: flex;
            align-items: center;
            padding: 10px;
            background: var(--secondary);
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
        }
        .option-label:hover { background: #d3d9df; }
        .option-label input { margin-right: 15px; transform: scale(1.2); }
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        button:hover { background: #004494; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            display: none;
        }
        .feedback.correct {
            display: block;
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .feedback.incorrect {
            display: block;
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .hidden { display: none; }
        .mistake-card {
            background: #fff3f3;
            border-left: 5px solid var(--danger);
            padding: 15px;
            margin-bottom: 20px;
        }
        .progress {
            font-weight: bold;
            color: #666;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="container" id="app">
    <!-- Апликација ће бити учитана овде путем JavaScript-а -->
</div>

<script>
    // База питања
    const questions = [
    {
        id: 1, type: "single",
        text: "Заокружити број испред кључне речи којом се при кодирању у програмском језику Ц, у наредби вишестуког гранања обележавају вредности за које се улази у поједине гране:",
        code: null,
        options: [
            {id: 1, text: "switch"},
            {id: 2, text: "break"},
            {id: 3, text: "return"},
            {id: 4, text: "case"}
        ],
        correct: [4],
        explanation: "Кључна реч 'case' се користи за обележавање конкретних грана унутар 'switch' наредбе."
    },
    {
        id: 2, type: "single",
        text: "У програмском језику Ц декларисане су променљивe и дат је део кода програма. Одредити шта је последица извршавања датог кода:",
        code: `FILE *fp;\nchar str[150];\nfp = fopen("primer.txt", "r");\nfgets(str, 80, fp);`,
        options: [
            {id: 1, text: "Учитава 80 карактера из датотеке и смешта у стринг str."},
            {id: 2, text: "Учитава максимално 150 карактера из датотеке и смешта у стринг str"},
            {id: 3, text: "Учитава стринг из датотеке све док се не учита знак за нови ред или 80 карактера"},
            {id: 4, text: "Учитава стринг из датотеке све док се не учита знак за нови ред или 150 карактера"}
        ],
        correct: [3],
        explanation: "Функција fgets учитава карактере све док не наиђе на знак за нови ред (\\n) или док не учита n-1 карактера (овде 79 карактера, како би остало места за терминирајући знак '\\0')."
    },
    {
        id: 3, type: "single",
        text: "Употрeбом функције fprintf(...) уписати декларисан податак (int pod) у стандардну излазну датотеку. Заокружити број испред исправно написане наредбе:",
        code: null,
        options: [
            {id: 1, text: "fprintf(pod);"},
            {id: 2, text: "fprintf(\"%d\", pod);"},
            {id: 3, text: "fprintf(\"%d\", pod, stdin);"},
            {id: 4, text: "fprintf(stdout, \"%d\", pod);"}
        ],
        correct: [4],
        explanation: "fprintf захтева показивач на датотеку као први аргумент. 'stdout' је стандардна излазна датотека."
    },
    {
        id: 4, type: "single",
        text: "Заокружити број испред исправно написане наредбе декларације и иницијализације променљиве x типа Lopta, тако да јој центар буде у тачки О(2,2,2), а полупречник 10цм:",
        code: `typedef struct\n{\n    float x, y, z;\n} Tacka3D;\n\ntypedef struct\n{\n    Tacka3D centar;\n    float R;\n} Lopta;`,
        options: [
            {id: 1, text: "Lopta x = {10, {2, 2, 2}};"},
            {id: 2, text: "Lopta x = {2, 2, 2, 10};"},
            {id: 3, text: "Lopta x = {2, 2, 2}, {10};"},
            {id: 4, text: "Lopta x = {{2, 2, 2}, 10};"}
        ],
        correct: [4],
        explanation: "Lopta се састоји прво од структуре Tacka3D (за коју требају витичасте заграде {2, 2, 2}), а затим следи float R (10)."
    },
    {
        id: 5, type: "single",
        text: "Заокружити редни број испред наредбе која омогућава учитавање три бајта са тренутне позиције из бинарне датотеке:",
        code: null,
        options: [
            {id: 1, text: "fread(podatak, 24, 1, fp);"},
            {id: 2, text: "fread(&podatak, 24, 0, fp);"},
            {id: 3, text: "fread(&podatak, 3, 1, fp);"},
            {id: 4, text: "fscanf(&podatak, 3, 1, fp);"},
            {id: 5, text: "fscanf(fp, 3, &podatak);"}
        ],
        correct: [3],
        explanation: "fread захтева адресу одредишта (&podatak), величину блока у бајтовима (3), број блокова (1) и показивач на фајл (fp)."
    },
    {
        id: 6, type: "single",
        text: "Заокружити редни број испред наредбе која омогућава упис три бајта у бинарну датотеку:",
        code: null,
        options: [
            {id: 1, text: "fprintf(&podatak, 3, 1, fp);"},
            {id: 2, text: "fprintf(fp, 3, &podatak);"},

    {
        id: 7, type: "single",
        text: "Након извршења ових наредби на екрану ће се приказати вредности променљивих у задатом формату. Заокружити број испред тачног одговора:",

    {
        id: 9, type: "single",

        text: "Код дат у тексту задатка треба реализовати помоћу једне if наредбе:",

    {
        id: 12, type: "single",
        text: "Свака for петља може се написати коришћењем while наредбе. Који код је еквивалентан коду датом у тексту задатка?",

        explanation: "Петља се извршава док је j < n И a[j] > 0. Увећање бројача j (j++) се дешава након додавања у суму (s += a[j++])."
    },
    {
        id: 13, type: "single",
        text: "Одредити шта се налази као резултат у променљивој x и y након извршења датог кода:",
        code: `unsigned a, b, x, y, temp;\nx = a * b;\nwhile(b) temp = a % b, a = b, b = temp;\ny = b;\nx /= y;`,
        options: [
            {id: 1, text: "x је производ а и б, а y је количник а са б"},
            {id: 2, text: "x је најмањи заједнички садржалац за а и б, а y највећи заједнички делилац за а и б"},

        correct: [4],
        explanation: "Петља while(b) се извршава све док b није 0. Када се петља заврши, b је сигурно 0, па y постаје 0. Након тога x /= y изазива грешку (дељење нулом)."

    return str.replace(/&/g, '&amp;')
              .replace(/</g, '&lt;')
              .replace(/>/g, '&gt;')
              .replace(/"/g, '&quot;')
              .replace(/'/g, '&#039;');
}
    function init() {
        // Учитавање претходних грешака ако постоје
        const savedMistakes = localStorage.getItem('c_quiz_mistakes');
        if (savedMistakes) {
            mistakes = JSON.parse(savedMistakes);
        }
        
        // Учитавање тренутног питања
        const savedIndex = localStorage.getItem('c_quiz_current_index');
        if (savedIndex !== null) {
            currentQuestionIndex = parseInt(savedIndex, 10);
        }

        renderQuestion();
    }

    function renderQuestion() {
        const q = questions[currentQuestionIndex];
        const isMulti = q.type === "multi";

        let html = `
            <div class="progress">Питање ${currentQuestionIndex + 1} од ${questions.length}</div>
            <h2>${escapeHTML(q.text)}</h2>
${q.code ? `<pre><code>${escapeHTML(q.code)}</code></pre>` : ''}
            <div class="options">
        `;

        q.options.forEach(opt => {
            html += `
                <label class="option-label">
                    <input type="${isMulti ? 'checkbox' : 'radio'}" name="answer" value="${opt.id}">
${escapeHTML(opt.text)}
                </label>
            `;
        });

        html += `
            </div>
            <button id="submitBtn" onclick="checkAnswer()">Потврди одговор</button>
            <div id="feedbackBox" class="feedback"></div>
            <button id="nextBtn" class="hidden" onclick="nextQuestion()">Следеће питање</button>
        `;

        app.innerHTML = html;
    }

    function checkAnswer() {
        const q = questions[currentQuestionIndex];
        const selected = Array.from(document.querySelectorAll('input[name="answer"]:checked'))
                              .map(cb => parseInt(cb.value))
                              .sort();

        if (selected.length === 0) {
            alert('Молимо вас изаберите одговор.');
            return;
        }

        const submitBtn = document.getElementById('submitBtn');
        const nextBtn = document.getElementById('nextBtn');
        const feedbackBox = document.getElementById('feedbackBox');
        
        // Онемогући дугме за слање и све инпуте
        submitBtn.disabled = true;
        document.querySelectorAll('input[name="answer"]').forEach(i => i.disabled = true);

        const isCorrect = arraysEqual(selected, q.correct.sort());

        if (isCorrect) {
            feedbackBox.className = 'feedback correct';
            feedbackBox.innerHTML = `<strong>Тачно!</strong> ${escapeHTML(q.explanation)}`;
        } else {
            feedbackBox.className = 'feedback incorrect';
            feedbackBox.innerHTML = `<strong>Нетачно!</strong> ${escapeHTML(q.explanation)}`;
            // Забележи грешку
            mistakes.push({
                questionNumber: currentQuestionIndex + 1,
                text: q.text,
                explanation: q.explanation
            });
            localStorage.setItem('c_quiz_mistakes', JSON.stringify(mistakes));
        }

        nextBtn.classList.remove('hidden');
    }

    function nextQuestion() {
        if (currentQuestionIndex < questions.length - 1) {
            currentQuestionIndex++;
            localStorage.setItem('c_quiz_current_index', currentQuestionIndex); // Чувамо тренутно питање
            renderQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        let html = `<h2>Резултати теста</h2>`;
        
        if (mistakes.length === 0) {
            html += `<p style="color: green; font-weight:bold;">Свака част! Немате ниједну грешку!</p>`;
        } else {
            html += `<p>Направили сте грешке у следећим задацима. Проучите објашњења како бисте утврдили градиво:</p>`;
            
            mistakes.forEach(m => {
                html += `
                    <div class="mistake-card">
                        <strong>Питање ${m.questionNumber}:</strong> ${escapeHTML(m.text)}
                        <div style="margin-top: 10px; color: #555;"><strong>Објашњење:</strong> ${escapeHTML(m.explanation)}</div>
                    </div>
                `;
            });
        }

        html += `<button onclick="restartTest()">Покушај поново (Брише историју грешака)</button>`;
        app.innerHTML = html;
    }

    function restartTest() {
        localStorage.removeItem('c_quiz_mistakes');
        localStorage.removeItem('c_quiz_current_index'); // Бришемо запамћено питање
        mistakes = [];
        currentQuestionIndex = 0;
        init();
    }

    function arraysEqual(a, b) {
        if (a.length !== b.length) return false;
        for (let i = 0; i < a.length; i++) {
            if (a[i] !== b[i]) return false;
        }
        return true;
    }

    // Покрени апликацију
    init();

</script>
